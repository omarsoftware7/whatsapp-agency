<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adly Web - Register</title>
  <link rel="stylesheet" href="/ui/styles.css?v=20260125b">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6D6PKSE06T"></script>

        c.hj=c.hj||function(){(c.hj.q=c.hj.q||[]).push(arguments)};

</head>
<body class="auth-layout">
  <div class="auth-card">
    <h1 data-i18n="register_title">Create your account</h1>
    <p class="muted" data-i18n="register_subtitle">Start building ads in minutes.</p>
    <div id="alert"></div>
    <button class="button google-button" id="google-register" type="button">
      <img class="social-logo" src="/assets/Google__G__logo.svg.png" alt="">
      <span data-i18n="auth_google_default">Continue with Google</span>
    </button>
    <div class="auth-divider" data-i18n="auth_or_email">or continue with email</div>
    <form id="register-form" class="stack">
      <div class="field">
        <label for="full_name" data-i18n="auth_full_name">Full name</label>
        <input id="full_name" type="text" name="full_name" data-i18n-placeholder="auth_full_name_placeholder" placeholder="Your name" required>
      </div>
      <div class="field">
        <label for="email" data-i18n="auth_email">Email</label>
        <input id="email" type="email" name="email" data-i18n-placeholder="auth_email_placeholder" placeholder="you@brand.com" required>
      </div>
      <div class="field">
        <label for="heard_about" data-i18n="auth_heard_about">How did you hear about us?</label>
        <select id="heard_about" name="heard_about" required>
          <option value="" disabled selected data-i18n="auth_select_one">Select one</option>
          <option value="google" data-i18n="auth_heard_google">Google Search</option>
          <option value="facebook" data-i18n="auth_heard_facebook">Facebook</option>
          <option value="instagram" data-i18n="auth_heard_instagram">Instagram</option>
          <option value="youtube" data-i18n="auth_heard_youtube">YouTube</option>
          <option value="friend" data-i18n="auth_heard_friend">Friend/Referral</option>
          <option value="agency" data-i18n="auth_heard_agency">Agency/Partner</option>
          <option value="other" data-i18n="auth_heard_other">Other</option>
        </select>
      </div>
      <div class="field">
        <label for="account_type" data-i18n="auth_account_type">Account type</label>
        <select id="account_type" name="account_type" required>
          <option value="" disabled selected data-i18n="auth_select_one">Select one</option>
          <option value="agency" data-i18n="auth_agency">Agency</option>
          <option value="freelancer" data-i18n="auth_freelancer">Freelancer</option>
          <option value="business" data-i18n="auth_business">Business</option>
        </select>
      </div>
      <div class="field checkbox">
        <label>
          <input id="has_referral" type="checkbox">
          <span data-i18n="auth_have_referral">I have a referral code</span>
        </label>
      </div>
      <div class="field" id="referral-field" style="display:none;">
        <label for="referral_code" data-i18n="auth_referral_code">Referral code</label>
        <input id="referral_code" type="text" name="referral_code" data-i18n-placeholder="auth_referral_code_placeholder" placeholder="EXAMPLECODE">
      </div>
      <div class="field">
        <label for="password" data-i18n="auth_password">Password</label>
        <input id="password" type="password" name="password" data-i18n-placeholder="auth_password_min" placeholder="At least 6 characters" minlength="6" required>
      </div>
      <button class="button secondary" type="submit" data-i18n="register_button">Create account</button>
      <a class="button secondary" href="/ui/login.html" data-i18n="register_back_to_login">Back to login</a>
    </form>
    <div class="auth-footer">
      <div class="lang-picker">
        <svg class="lang-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <select class="select lang-select" id="lang-select" aria-label="Language">
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <option value="he">עברית</option>
        </select>
      </div>
    </div>
  </div>

  <script src="/ui/shared.js?v=20260126"></script>
  <script>
    setDefaultTheme();
    setLanguage(getLanguage());
    initLanguageSelector();
    const form = document.getElementById('register-form');
    const alertBox = document.getElementById('alert');
    const googleBtn = document.getElementById('google-register');
    const hasReferral = document.getElementById('has_referral');
    const referralField = document.getElementById('referral-field');
    const referralInput = document.getElementById('referral_code');

    googleBtn.addEventListener('click', () => {
      const params = new URLSearchParams();
      if (form.heard_about?.value) {
        params.set('heard_about', form.heard_about.value);
      }
      if (hasReferral.checked && referralInput?.value?.trim()) {
        params.set('referral_code', referralInput.value.trim());
      }
      const suffix = params.toString();
      window.location.href = `/api/web_google_oauth.php?action=start${suffix ? `&${suffix}` : ''}`;
    });

    hasReferral.addEventListener('change', () => {
      referralField.style.display = hasReferral.checked ? 'block' : 'none';
      if (!hasReferral.checked && referralInput) {
        referralInput.value = '';
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearAlert(alertBox);

      const payload = {
        action: 'register',
        full_name: form.full_name.value.trim(),
        email: form.email.value.trim(),
        account_type: form.account_type.value,
        password: form.password.value,
        heard_about: form.heard_about.value,
        referral_code: form.referral_code ? form.referral_code.value.trim() : ''
      };

      try {
        await apiRequest('/web_auth.php', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        window.location.href = '/ui/onboarding.html';
      } catch (error) {
        showAlert(alertBox, error.message);
      }
    });
  </script>
</body>
</html>
