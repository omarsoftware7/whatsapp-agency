<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adly Web - Login</title>
  <link rel="stylesheet" href="/ui/styles.css?v=20260125b">
  <!-- Google tag (gtag.js) -->

    window.dataLayer = window.dataLayer || [];

        c.hj=c.hj||function(){(c.hj.q=c.hj.q||[]).push(arguments)};
        c._hjSettings = { hjid: a };

        e.src = q + c._hjSettings.hjid + u;

  </script>
</head>
<body class="auth-layout">
  <div class="auth-card">
    <h1 data-i18n="login_title">Welcome back</h1>
    <p class="muted" data-i18n="login_subtitle">Log in to create and manage your brands.</p>
    <div id="alert"></div>
    <button class="button google-button" id="google-login" type="button">
      <img class="social-logo" src="/assets/Google__G__logo.svg.png" alt="">
      <span data-i18n="auth_google_default">Continue with Google</span>
    </button>
    <div class="auth-divider" data-i18n="auth_or_email">or continue with email</div>
    <form id="login-form" class="stack">
      <div class="field">
        <label for="email" data-i18n="auth_email">Email</label>
        <input id="email" type="email" name="email" data-i18n-placeholder="auth_email_placeholder" placeholder="you@brand.com" required>
      </div>
      <div class="field">
        <label for="password" data-i18n="auth_password">Password</label>
        <input id="password" type="password" name="password" data-i18n-placeholder="auth_password_placeholder" placeholder="••••••••" required>
      </div>
      <button class="button secondary" type="submit" data-i18n="login_button">Log in</button>
      <a class="button secondary" href="/ui/register.html" data-i18n="login_create_account">Create account</a>
    </form>
    <div class="auth-footer">
      <div class="lang-picker">
        <svg class="lang-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <select class="select lang-select" id="lang-select" aria-label="Language">
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <option value="he">עברית</option>
        </select>
      </div>
    </div>
  </div>

  <script src="/ui/shared.js?v=20260126"></script>
  <script>
    setDefaultTheme();
    setLanguage(getLanguage());
    initLanguageSelector();
    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('alert');
    const googleBtn = document.getElementById('google-login');

    googleBtn.addEventListener('click', () => {
      window.location.href = '/api/web_google_oauth.php?action=start';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearAlert(alertBox);

      const payload = {
        action: 'login',
        email: form.email.value.trim(),
        password: form.password.value
      };

      try {
        await apiRequest('/web_auth.php', {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        const brands = await apiRequest('/web_brands.php');
        if (brands.items && brands.items.length > 0) {
          const pending = brands.items.find((b) => (b.phone_number || '').startsWith('web') && !b.onboarding_complete);
          window.location.href = pending ? '/ui/onboarding.html' : '/ui/app.html';
        } else {
          window.location.href = '/ui/onboarding.html';
        }
      } catch (error) {
        showAlert(alertBox, error.message);
      }
    });
  </script>
</body>
</html>
