  <style>
    /* User Modal Styles */
    .user-modal-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--brand-border, #e2e8f0);
      margin-bottom: 16px;
    }
    .user-avatar-large {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-header-info { flex: 1; }
    .user-header-name {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--brand-ink, #1e293b);
    }
    .user-header-email {
      color: var(--brand-muted, #64748b);
      margin-bottom: 8px;
    }
    .user-header-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .user-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      text-transform: uppercase;
    }
    .user-header-value {
      text-align: right;
      flex-shrink: 0;
    }
    .user-value-amount {
      font-size: 1.5rem;
      font-weight: 700;
      color: #22c55e;
    }
    .user-value-label {
      font-size: 0.75rem;
      color: var(--brand-muted, #64748b);
      text-transform: uppercase;
    }

    /* Tabs */
    .user-modal-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--brand-border, #e2e8f0);
      margin-bottom: 16px;
    }
    .user-tab {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--brand-muted, #64748b);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .user-tab:hover { color: var(--brand-ink, #1e293b); }
    .user-tab.active {
      color: #6366f1;
      border-bottom-color: #6366f1;
    }
    .user-tab-panel { display: none; }
    .user-tab-panel.active { display: block; }

    /* Info Grid */
    .user-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    .user-info-section {
      background: var(--brand-surface, #f8fafc);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--brand-border, #e2e8f0);
    }
    .user-info-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.875rem;
    }
    .user-info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--brand-border, #e2e8f0);
    }
    .user-info-row:last-child { border-bottom: none; }
    .user-info-row span:first-child { color: var(--brand-muted, #64748b); }
    .user-info-row span:last-child { font-weight: 500; }

    /* Stats Grid */
    .user-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .user-stat {
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      border-radius: 8px;
      border: 1px solid var(--brand-border, #e2e8f0);
    }
    .user-stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brand-ink, #1e293b);
    }
    .user-stat-label {
      font-size: 0.75rem;
      color: var(--brand-muted, #64748b);
      text-transform: uppercase;
    }

    /* Credits Grid */
    .user-credits-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .user-credit-card {
      text-align: center;
      padding: 16px;
      background: #fff;
      border-radius: 8px;
      border: 2px solid var(--brand-border, #e2e8f0);
    }
    .user-credit-icon { font-size: 1.5rem; margin-bottom: 4px; }
    .user-credit-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: #6366f1;
    }
    .user-credit-label {
      font-size: 0.75rem;
      color: var(--brand-muted, #64748b);
    }

    /* Activity Items */
    .user-activity-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px;
      background: #fff;
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid var(--brand-border, #e2e8f0);
    }
    .user-activity-icon { font-size: 1.25rem; }
    .user-activity-content { flex: 1; }
    .user-activity-title { font-weight: 500; font-size: 0.875rem; }
    .user-activity-meta { font-size: 0.75rem; color: var(--brand-muted, #64748b); }

    /* History Sections */
    .user-history-sections details { margin-bottom: 12px; }
    .user-history-summary {
      cursor: pointer;
      padding: 10px 12px;
      background: var(--brand-surface, #f8fafc);
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.875rem;
      list-style: none;
    }
    .user-history-summary::-webkit-details-marker { display: none; }
    .user-history-summary::before {
      content: "▸ ";
      display: inline-block;
      transition: transform 0.2s;
    }
    details[open] .user-history-summary::before {
      transform: rotate(90deg);
    }
    .user-history-list {
      padding: 8px 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .user-history-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--brand-border, #e2e8f0);
      font-size: 0.875rem;
    }
    .user-history-item:last-child { border-bottom: none; }

    /* Edit Grid */
    .user-edit-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .user-edit-grid .field { margin-bottom: 0; }

    /* Make modal wider */
    .admin-user-modal { max-width: 800px; width: 100%; }

    /* Leading Indicators */
    .user-indicators-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 8px;
    }
    .user-indicator {
      text-align: center;
      padding: 12px 8px;
      background: #fff;
      border-radius: 8px;
      border: 2px solid var(--brand-border, #e2e8f0);
    }
    .user-indicator.good {
      border-color: #22c55e;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
    }
    .user-indicator.warning {
      border-color: #f59e0b;
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
    }
    .user-indicator.poor {
      border-color: #ef4444;
      background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
    }
    .user-indicator-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--brand-ink, #1e293b);
    }
    .user-indicator.good .user-indicator-value { color: #16a34a; }
    .user-indicator.warning .user-indicator-value { color: #d97706; }
    .user-indicator.poor .user-indicator-value { color: #dc2626; }
    .user-indicator-label {
      font-size: 0.7rem;
      color: var(--brand-muted, #64748b);
      text-transform: uppercase;
    }

    /* Table coloring */
    .crm-table td.good { color: #16a34a; font-weight: 600; }
    .crm-table td.warning { color: #d97706; font-weight: 600; }
    .crm-table td.poor { color: #dc2626; font-weight: 600; }

    @media (max-width: 768px) {
      .user-modal-header { flex-direction: column; }
      .user-header-value { text-align: left; }
      .user-stats-grid, .user-credits-grid { grid-template-columns: repeat(2, 1fr); }
      .user-edit-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  <script src="/ui/shared.js?v=20260126"></script>
  <script>
    (async () => {
    // Verify admin access before showing anything
    const adminUser = await ensureAdmin();
    if (!adminUser) return;
    
    setDefaultTheme();
    const table = document.getElementById('users-table');
    const alertBox = document.getElementById('alert');
    const userModal = document.getElementById('user-modal');
    const userModalBody = document.getElementById('user-modal-body');
    const createModal = document.getElementById('create-modal');
    const createAlert = document.getElementById('create-alert');
    const createToggle = document.getElementById('admin-create-user');
    const createSubmit = document.getElementById('create-user-submit');

    const searchInput = document.getElementById('user-search');
    const sortSelect = document.getElementById('user-sort');
    let allUsers = [];
    let userPage = 1;
    const USERS_PER_PAGE = 15;

    async function loadUsers() {
      clearAlert(alertBox);
      try {
        const data = await apiRequest('/web_admin_users.php');
        allUsers = data.items || [];
        renderUsers();
      } catch (error) {
        showAlert(alertBox, error.message);
      }
    }

    function applySort(items) {
      const sort = sortSelect.value;
      return items.slice().sort((a, b) => {
        if (sort === 'created_asc') return new Date(a.created_at) - new Date(b.created_at);
        if (sort === 'created_desc') return new Date(b.created_at) - new Date(a.created_at);
        if (sort === 'last_login_desc') return new Date(b.last_login_at || 0) - new Date(a.last_login_at || 0);
        if (sort === 'brands_desc') return (b.brand_count || 0) - (a.brand_count || 0);
        if (sort === 'payments_desc') return (b.payments_count || 0) - (a.payments_count || 0);
        return 0;
      });
    }

    function formatDate(value) {
      if (!value) return '—';
      const date = new Date(String(value).replace(' ', 'T'));
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatCurrency(value) {
      const num = Number(value || 0);
      if (Number.isNaN(num)) return '₪0';
      return `₪${num.toFixed(0)}`;
    }

    function renderUsers() {
      const term = (searchInput.value || '').toLowerCase();
      let items = allUsers.filter((user) => user.email.toLowerCase().includes(term));
      items = applySort(items);
      const totalPages = Math.max(1, Math.ceil(items.length / USERS_PER_PAGE));
      if (userPage > totalPages) userPage = totalPages;
      const start = (userPage - 1) * USERS_PER_PAGE;
      const pageItems = items.slice(start, start + USERS_PER_PAGE);
      if (!items.length) {
        table.innerHTML = '<tbody><tr><td class="muted">No users found.</td></tr></tbody>';
        document.getElementById('users-page').textContent = `Page ${userPage} of ${totalPages}`;
        document.getElementById('users-prev').disabled = userPage <= 1;
        document.getElementById('users-next').disabled = userPage >= totalPages;
        return;
      }

      table.innerHTML = `
        <thead>
          <tr>
            <th>Actions</th>
            <th>Email</th>
            <th>Type</th>
            <th>Via</th>
            <th>Plan</th>
            <th>Status</th>
            <th>Brands</th>
            <th>Jobs</th>
            <th>Pub%</th>
            <th>Login</th>
            <th>Pay</th>
            <th>₪</th>
          </tr>
        </thead>
        <tbody>
          ${pageItems.map((user) => {
            const pubRate = user.publishing_rate ?? 0;
            const pubClass = pubRate >= 50 ? 'good' : pubRate >= 25 ? 'warning' : pubRate > 0 ? 'poor' : '';
            return `
            <tr>
              <td><button class="button secondary compact" data-open="${user.id}">Open</button></td>
              <td title="${user.first_name || ''} ${user.last_name || ''}">${user.email}</td>
              <td>${user.account_type ? user.account_type.charAt(0).toUpperCase() : '—'}</td>
              <td>${user.registration_method === 'google' ? '🔷' : '📧'}</td>
              <td>${user.plan_tier || 'trial'}</td>
              <td>${user.subscription_status || 'trial'}</td>
              <td>${user.brand_count ?? 0}</td>
              <td>${user.total_jobs ?? 0}</td>
              <td class="${pubClass}">${pubRate}%</td>
              <td>${formatDate(user.last_login_at)}</td>
              <td>${user.payments_count ?? 0}</td>
              <td>${formatCurrency(user.payments_total)}</td>
            </tr>
          `}).join('')}
        </tbody>
      `;
      document.getElementById('users-page').textContent = `Page ${userPage} of ${totalPages}`;
      document.getElementById('users-prev').disabled = userPage <= 1;
      document.getElementById('users-next').disabled = userPage >= totalPages;
    }

    searchInput.addEventListener('input', () => {
      userPage = 1;
      renderUsers();
    });
    sortSelect.addEventListener('change', () => {
      userPage = 1;
      renderUsers();
    });
    document.getElementById('users-prev').addEventListener('click', () => {
      if (userPage > 1) {
        userPage -= 1;
        renderUsers();
      }
    });
    document.getElementById('users-next').addEventListener('click', () => {
      userPage += 1;
      renderUsers();
    });

    table.addEventListener('click', (event) => {
      const openBtn = event.target.closest('[data-open]');
      if (!openBtn) return;
      const userId = Number(openBtn.dataset.open || 0);
      if (!userId) return;
      const user = allUsers.find((u) => Number(u.id) === userId);
      if (!user) return;
      openUserModal(user);
    });

    // Create user modal
    function openCreateModal() {
      if (createModal) {
        createModal.classList.remove('hidden');
        createModal.classList.add('open');
        clearAlert(createAlert);
      }
    }
    function closeCreateModal() {
      if (createModal) {
        createModal.classList.add('hidden');
        createModal.classList.remove('open');
      }
    }

    if (createToggle) {
      createToggle.addEventListener('click', openCreateModal);
    }
    if (createModal) {
      createModal.querySelectorAll('[data-create-close]').forEach((el) => {
        el.addEventListener('click', closeCreateModal);
      });
    }

    if (createSubmit) {
      createSubmit.addEventListener('click', async () => {
        clearAlert(createAlert);
        const email = document.getElementById('new-email').value.trim();
        const password = document.getElementById('new-password').value;
        const role = document.getElementById('new-role').value;
        const subscriptionStatus = document.getElementById('new-subscription').value;
        const planTier = document.getElementById('new-plan').value;
        const maxBrands = document.getElementById('new-max-brands').value;
        const textCredits = document.getElementById('new-text-credits').value;
        const imageCredits = document.getElementById('new-image-credits').value;
        const videoCredits = document.getElementById('new-video-credits').value;
        const landingCredits = document.getElementById('new-landing-credits').value;
        const isActive = document.getElementById('new-active').value;

        try {
          createSubmit.disabled = true;
          createSubmit.textContent = 'Creating...';
          await apiRequest('/web_admin_users.php', {
            method: 'POST',
            body: JSON.stringify({
              action: 'create',
              email,
              password,
              role,
              subscription_status: subscriptionStatus,
              plan_tier: planTier,
              max_brands: maxBrands === '' ? null : Number(maxBrands),
              text_credits_remaining: Number(textCredits || 0),
              image_credits_remaining: Number(imageCredits || 0),
              video_credits_remaining: Number(videoCredits || 0),
              landing_credits_remaining: Number(landingCredits || 0),
              is_active: Number(isActive)
            })
          });
          document.getElementById('new-email').value = '';
          document.getElementById('new-password').value = '';
          document.getElementById('new-max-brands').value = '';
          document.getElementById('new-text-credits').value = '0';
          document.getElementById('new-image-credits').value = '0';
          document.getElementById('new-video-credits').value = '0';
          document.getElementById('new-landing-credits').value = '0';
          closeCreateModal();
          await loadUsers();
          showAlert(alertBox, 'User created', 'success');
        } catch (error) {
          showAlert(createAlert, error.message);
        } finally {
          createSubmit.disabled = false;
          createSubmit.textContent = 'Create';
        }
      });
    }

    function truncate(text, length = 80) {
      if (!text) return '';
      return text.length > length ? `${text.slice(0, length)}…` : text;
    }

    function renderHistoryList(items, formatter, emptyMsg = 'No entries yet.') {
      if (!items || !items.length) {
        return `<div class="muted">${emptyMsg}</div>`;
      }
      return `
        <div class="stack" style="gap:4px;">
          ${items.map((item) => `
            <div class="job-item" style="padding:6px 0; border-bottom: 1px solid var(--brand-subtle);">
              <div class="muted">${formatter(item)}</div>
              <div class="muted" style="font-size:0.85em;">${item.created_at || item.requested_at || item.login_at || ''}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function openModal() {
      if (!userModal) return;
      userModal.classList.remove('hidden');
      userModal.classList.add('open');
    }

    function closeModal() {
      if (!userModal) return;
      userModal.classList.add('hidden');
      userModal.classList.remove('open');
      if (userModalBody) userModalBody.innerHTML = '';
    }

    if (userModal) {
      userModal.querySelectorAll('[data-user-close]').forEach((el) => {
        el.addEventListener('click', closeModal);
      });
    }

    async function loadUserHistory(userId) {
      try {
        const data = await apiRequest(`/web_admin_user_history.php?user_id=${userId}`);
        return data;
      } catch (error) {
        return { error: error.message };
      }
    }

    function getStatusColor(status) {
      const colors = {
        'active': '#22c55e',
        'trial': '#3b82f6',
        'canceled': '#ef4444',
        'expired': '#6b7280',
        'past_due': '#f59e0b'
      };
      return colors[status] || '#6b7280';
    }

    function getPlanColor(plan) {
      const colors = {
        'agency': '#8b5cf6',
        'pro': '#6366f1',
        'growth': '#3b82f6',
        'starter': '#22c55e',
        'trial': '#64748b',
        'expired': '#6b7280'
      };
      return colors[plan] || '#6b7280';
    }

    async function openUserModal(user) {
      if (!userModalBody) return;
      
      const statusColor = getStatusColor(user.subscription_status);
      const planColor = getPlanColor(user.plan_tier);
      const isActive = user.is_active ? true : false;
      
      const summary = `
        <div class="user-modal-header">
          <div class="user-avatar-large">${(user.first_name || user.email || 'U').charAt(0).toUpperCase()}</div>
          <div class="user-header-info">
            <div class="user-header-name">${user.first_name || ''} ${user.last_name || ''}</div>
            <div class="user-header-email">${user.email}</div>
            <div class="user-header-badges">
              <span class="user-badge" style="background:${planColor}">${user.plan_tier || 'trial'}</span>
              <span class="user-badge" style="background:${statusColor}">${user.subscription_status || 'trial'}</span>
              ${user.role === 'admin' ? '<span class="user-badge" style="background:#ef4444">Admin</span>' : ''}
              ${!isActive ? '<span class="user-badge" style="background:#374151">Disabled</span>' : ''}
            </div>
          </div>
          <div class="user-header-value">
            <div class="user-value-amount">${formatCurrency(user.payments_total)}</div>
            <div class="user-value-label">Lifetime value</div>
          </div>
        </div>

        <div class="user-modal-tabs">
          <button class="user-tab active" data-tab="overview">Overview</button>
          <button class="user-tab" data-tab="credits">Credits</button>
          <button class="user-tab" data-tab="activity">Activity</button>
          <button class="user-tab" data-tab="history">History</button>
          <button class="user-tab" data-tab="edit">Edit</button>
        </div>

        <div class="user-tab-panel active" data-panel="overview">
          <div class="user-info-grid">
            <div class="user-info-section">
              <div class="user-info-title">📋 Account Details</div>
              <div class="user-info-row"><span>User ID</span><span>#${user.id}</span></div>
              <div class="user-info-row"><span>Role</span><span>${user.role}</span></div>
              <div class="user-info-row"><span>Type</span><span>${user.account_type || '—'}</span></div>
              <div class="user-info-row"><span>Registered via</span><span>${user.registration_method === 'google' ? '🔷 Google' : '📧 Email'}</span></div>
              <div class="user-info-row"><span>Created</span><span>${formatDate(user.created_at)}</span></div>
              <div class="user-info-row"><span>Last login</span><span>${formatDate(user.last_login_at)}</span></div>
              <div class="user-info-row"><span>Last activity</span><span>${formatDate(user.last_activity_at)}</span></div>
            </div>
            <div class="user-info-section">
              <div class="user-info-title">💳 Subscription</div>
              <div class="user-info-row"><span>Plan</span><span style="color:${planColor};font-weight:600;">${user.plan_tier || 'trial'}</span></div>
              <div class="user-info-row"><span>Status</span><span style="color:${statusColor};font-weight:600;">${user.subscription_status || 'trial'}</span></div>
              <div class="user-info-row"><span>Plan ends</span><span>${formatDate(user.plan_end_at)}</span></div>
              <div class="user-info-row"><span>Trial ends</span><span>${formatDate(user.trial_end_at)}</span></div>
              <div class="user-info-row"><span>Payments</span><span>${user.payments_count ?? 0}</span></div>
            </div>
            <div class="user-info-section">
              <div class="user-info-title">🔗 Referrals & Source</div>
              <div class="user-info-row"><span>Heard about us</span><span>${user.heard_about || '—'}</span></div>
              <div class="user-info-row"><span>Referred by</span><span>${user.referrer_email || '—'}</span></div>
              <div class="user-info-row"><span>Referrals made</span><span>${user.referrals_count ?? 0}</span></div>
            </div>

          <div class="user-stats-grid">

              <div class="user-stat-value">${user.brand_count ?? 0}</div>
              <div class="user-stat-label">Brands</div>
            </div>
            <div class="user-stat">
              <div class="user-stat-value">${user.active_jobs_count ?? 0}</div>
              <div class="user-stat-label">Active Jobs</div>
            </div>
            <div class="user-stat">
              <div class="user-stat-value">${user.published_posts_count ?? 0}</div>
              <div class="user-stat-label">Published</div>
            </div>
            <div class="user-stat">
              <div class="user-stat-value">${user.leads_count ?? 0}</div>
              <div class="user-stat-label">Leads</div>
            </div>
          </div>

          <div class="user-info-section" style="margin-top:16px;">
            <div class="user-info-title">🎯 Leading Indicators</div>
            <div class="user-indicators-grid">
              <div class="user-indicator">
                <div class="user-indicator-value">${user.total_jobs ?? 0}</div>
                <div class="user-indicator-label">Total Jobs</div>
              </div>
              <div class="user-indicator ${(user.publishing_rate ?? 0) >= 50 ? 'good' : (user.publishing_rate ?? 0) >= 25 ? 'warning' : 'poor'}">
                <div class="user-indicator-value">${user.publishing_rate ?? 0}%</div>
                <div class="user-indicator-label">Publishing Rate</div>
              </div>
              <div class="user-indicator">
                <div class="user-indicator-value">${user.job_types_used ?? 0}</div>
                <div class="user-indicator-label">Feature Types</div>
              </div>
              <div class="user-indicator ${(user.time_to_first_job_hours ?? 999) <= 24 ? 'good' : (user.time_to_first_job_hours ?? 999) <= 72 ? 'warning' : 'poor'}">
                <div class="user-indicator-value">${user.time_to_first_job_hours != null ? user.time_to_first_job_hours + 'h' : '—'}</div>
                <div class="user-indicator-label">Time to 1st Job</div>
              </div>
            </div>
          </div>
        </div>

        <div class="user-tab-panel" data-panel="credits">
          <div class="user-credits-grid">
            <div class="user-credit-card">
              <div class="user-credit-icon">✏️</div>
              <div class="user-credit-value">${user.text_credits_remaining ?? 0}</div>
              <div class="user-credit-label">Text Credits</div>
            </div>
            <div class="user-credit-card">
              <div class="user-credit-icon">🖼️</div>
              <div class="user-credit-value">${user.image_credits_remaining ?? 0}</div>
              <div class="user-credit-label">Image Credits</div>
            </div>
            <div class="user-credit-card">
              <div class="user-credit-icon">🎬</div>
              <div class="user-credit-value">${user.video_credits_remaining ?? 0}</div>
              <div class="user-credit-label">Video Credits</div>
            </div>
            <div class="user-credit-card">
              <div class="user-credit-icon">🌐</div>
              <div class="user-credit-value">${user.landing_credits_remaining ?? 0}</div>
              <div class="user-credit-label">Landing Credits</div>
            </div>
          </div>
          <div class="user-info-section" style="margin-top:16px;">
            <div class="user-info-title">📊 Usage Stats</div>
            <div class="user-info-row"><span>Designs created</span><span>${user.designs_count ?? 0}</span></div>
            <div class="user-info-row"><span>Ad copies created</span><span>${user.ad_copies_count ?? 0}</span></div>
            <div class="user-info-row"><span>Videos created</span><span>${user.videos_count ?? 0}</span></div>
            <div class="user-info-row"><span>Landing pages</span><span>${user.landing_pages_count ?? 0}</span></div>
            <div class="user-info-row"><span>Business cards</span><span>${user.cards_count ?? 0}</span></div>
            <div class="user-info-row"><span>Max brands</span><span>${user.max_brands ?? '∞'}</span></div>
          </div>
        </div>

        <div class="user-tab-panel" data-panel="activity">
          <div id="user-activity-content" class="muted">Loading activity...</div>
        </div>

        <div class="user-tab-panel" data-panel="history">
          <div id="user-history-content" class="muted">Loading history...</div>
        </div>
      `;
      const editForm = `
        <div class="user-tab-panel" data-panel="edit">
          <div class="alert" style="background:#fef3c7;border:1px solid #f59e0b;color:#92400e;padding:12px;border-radius:8px;margin-bottom:16px;">
            💡 When changing plan tier to active, credits will auto-fill based on plan limits.
          </div>
          <div class="user-edit-grid">
            <div class="field">
              <label>Role</label>
              <select id="edit-role">
                <option value="user">user</option>
                <option value="admin">admin</option>
              </select>
            </div>
            <div class="field">
              <label>Plan tier</label>
              <select id="edit-plan">
                <option value="trial">trial</option>
                <option value="starter">starter</option>
                <option value="growth">growth</option>
                <option value="pro">pro</option>
                <option value="agency">agency</option>
                <option value="expired">expired</option>
              </select>
            </div>
            <div class="field">
              <label>Status</label>
              <select id="edit-status">
                <option value="trial">trial</option>
                <option value="active">active</option>
                <option value="canceled">canceled</option>
                <option value="expired">expired</option>
                <option value="past_due">past_due</option>
              </select>
            </div>
            <div class="field">
              <label>Account</label>
              <select id="edit-active">
                <option value="1">active</option>
                <option value="0">disabled</option>
              </select>
            </div>
            <div class="field">
              <label>Max brands</label>
              <input id="edit-max-brands" type="number" min="1" placeholder="Unlimited">
            </div>
            <div class="field">
              <label>Text credits</label>
              <input id="edit-text-credits" type="number" min="0">
            </div>
            <div class="field">
              <label>Image credits</label>
              <input id="edit-image-credits" type="number" min="0">
            </div>
            <div class="field">
              <label>Video credits</label>
              <input id="edit-video-credits" type="number" min="0">
            </div>
            <div class="field">
              <label>Landing credits</label>
              <input id="edit-landing-credits" type="number" min="0">
            </div>
            <div class="field">
              <label>Plan ends</label>
              <input id="edit-plan-end" type="datetime-local">
            </div>
            <div class="field">
              <label>Trial ends</label>
              <input id="edit-trial-end" type="datetime-local">
            </div>
          </div>
          <div style="margin-top:16px;">
            <button class="button" id="edit-save">💾 Save changes</button>
          </div>
        </div>
        `;

      userModalBody.innerHTML = `${summary}${editForm}`;
      openModal();

      // Tab switching
      userModalBody.querySelectorAll('.user-tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          userModalBody.querySelectorAll('.user-tab').forEach((t) => t.classList.remove('active'));
          userModalBody.querySelectorAll('.user-tab-panel').forEach((p) => p.classList.remove('active'));
          tab.classList.add('active');
          const panel = userModalBody.querySelector(`[data-panel="${tab.dataset.tab}"]`);
          if (panel) panel.classList.add('active');
          
          // Load content on tab switch
          if (tab.dataset.tab === 'activity') loadActivityContent(user.id);
          if (tab.dataset.tab === 'history') loadHistoryContent(user.id);
        });
      });

      // Populate edit form values
      document.getElementById('edit-role').value = user.role;
      document.getElementById('edit-plan').value = user.plan_tier || 'trial';
      document.getElementById('edit-status').value = user.subscription_status || 'trial';
      document.getElementById('edit-active').value = String(user.is_active);
      document.getElementById('edit-max-brands').value = user.max_brands ?? '';
      document.getElementById('edit-text-credits').value = user.text_credits_remaining ?? 0;
      document.getElementById('edit-image-credits').value = user.image_credits_remaining ?? 0;
      document.getElementById('edit-video-credits').value = user.video_credits_remaining ?? 0;
      document.getElementById('edit-landing-credits').value = user.landing_credits_remaining ?? 0;
      document.getElementById('edit-plan-end').value = user.plan_end_at ? user.plan_end_at.replace(' ', 'T') : '';
      document.getElementById('edit-trial-end').value = user.trial_end_at ? user.trial_end_at.replace(' ', 'T') : '';
      document.getElementById('edit-save').addEventListener('click', async () => {
        const saveBtn = document.getElementById('edit-save');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        const payload = {
          action: 'update',
          user_id: user.id,
          role: document.getElementById('edit-role').value,
          plan_tier: document.getElementById('edit-plan').value,
          subscription_status: document.getElementById('edit-status').value,
          is_active: Number(document.getElementById('edit-active').value),
          max_brands: document.getElementById('edit-max-brands').value === '' ? null : Number(document.getElementById('edit-max-brands').value),
          text_credits_remaining: Number(document.getElementById('edit-text-credits').value || 0),
          image_credits_remaining: Number(document.getElementById('edit-image-credits').value || 0),
          video_credits_remaining: Number(document.getElementById('edit-video-credits').value || 0),
          landing_credits_remaining: Number(document.getElementById('edit-landing-credits').value || 0),
          plan_end_at: document.getElementById('edit-plan-end').value,
          trial_end_at: document.getElementById('edit-trial-end').value
        };
        try {
          await apiRequest('/web_admin_users.php', { method: 'POST', body: JSON.stringify(payload) });
          await loadUsers();
          closeModal();
          showAlert(alertBox, 'User updated', 'success');
        } catch (error) {
          showAlert(alertBox, error.message);
          saveBtn.disabled = false;
          saveBtn.textContent = '💾 Save changes';
        }
      });
    }

    async function loadActivityContent(userId) {
      const container = document.getElementById('user-activity-content');
      if (!container) return;
      container.innerHTML = '<div class="muted">Loading activity...</div>';
      
      const data = await loadUserHistory(userId);
      if (data.error) {
        container.innerHTML = `<div class="muted">${data.error}</div>`;
        return;
      }

      container.innerHTML = `
        <div class="user-info-section">
          <div class="user-info-title">📦 Brands (${(data.brands || []).length})</div>
          ${(data.brands || []).length ? data.brands.map((b) => `
            <div class="user-activity-item">
              <div class="user-activity-icon">🏪</div>
              <div class="user-activity-content">
                <div class="user-activity-title">${b.business_name || 'Unnamed'}</div>
                <div class="user-activity-meta">ID: ${b.id} · Created: ${b.created_at || '—'}</div>
              </div>
            </div>

        <div class="user-info-section" style="margin-top:16px;">

          ${(data.jobs || []).length ? data.jobs.slice(0, 10).map((j) => `
            <div class="user-activity-item">
              <div class="user-activity-icon">${j.deleted_at ? '🗑️' : '📝'}</div>
              <div class="user-activity-content">
                <div class="user-activity-title">${j.business_name || 'Brand'} · ${j.job_type || 'job'}</div>

              </div>
            </div>
          `).join('') : '<div class="muted">No jobs yet</div>'}
        </div>
      `;
    }

    async function loadHistoryContent(userId) {
      const container = document.getElementById('user-history-content');

      container.innerHTML = '<div class="muted">Loading history...</div>';
      
      const data = await loadUserHistory(userId);
      if (data.error) {
        container.innerHTML = `<div class="muted">${data.error}</div>`;
        return;
      }

      container.innerHTML = `
        <div class="user-history-sections">
          <details open>
            <summary class="user-history-summary">💳 Payments (${(data.payments || []).length})</summary>
            <div class="user-history-list">
              ${(data.payments || []).length ? data.payments.map((p) => `
                <div class="user-history-item">
                  <span>${formatCurrency(p.amount)} · ${p.status || ''}</span>
                  <span class="muted">${p.created_at || ''}</span>

              `).join('') : '<div class="muted">No payments</div>'}

          </details>
          <details>
            <summary class="user-history-summary">🔐 Login History (${(data.logins || []).length})</summary>

                <div class="user-history-item">
                  <span>IP: ${l.ip_address || '—'}</span>

                  <span class="muted">${d.requested_at || ''}</span>

              `).join('') : '<div class="muted">No design requests</div>'}

          </details>
          <details>
            <summary class="user-history-summary">🌐 Landing Page Requests (${(data.landing_requests || []).length})</summary>

              `).join('') : '<div class="muted">No activity</div>'}

          </details>
        </div>

    }

    loadUsers();
    })();
  </script>
</body>
</html>
