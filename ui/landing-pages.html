      <div class="sidebar-header">
        <div class="brand-lockup">
          <div class="brand-logo">
            <img id="sidebar-brand-logo" src="" alt="Brand logo">
          </div>
          <div>
            <div class="brand-title" id="sidebar-brand-name">Adly</div>
          </div>
        </div>
        <button class="icon-button sidebar-close" id="sidebar-close" aria-label="Close">✕</button>
      </div>
      <div class="sidebar-section"></div>
      <div class="sidebar-section brand-switcher-slot" id="brand-switcher-slot-sidebar">
        <div class="brand-switcher" id="brand-switcher">
          <select class="select" id="brand-select"></select>
          <a class="button add-brand-button" href="/ui/onboarding.html" aria-label="Add brand" data-i18n="common_add_brand">Add Brand</a>

      <nav class="sidebar-nav">
        <a class="nav-item" data-nav="dashboard" href="/ui/app.html"><svg class="nav-icon" aria-hidden="true"><use href="/ui/icons.svg#icon-home"></use></svg><span data-i18n="nav_dashboard">Dashboard</span></a>

        <a class="nav-item" data-nav="landing-pages" data-client-link="/ui/landing-pages.html"><svg class="nav-icon" aria-hidden="true"><use href="/ui/icons.svg#icon-landing"></use></svg><span data-i18n="nav_landing_pages">Landing pages</span></a>
        <a class="nav-item" data-nav="leads" data-client-link="/ui/leads.html"><svg class="nav-icon" aria-hidden="true"><use href="/ui/icons.svg#icon-leads"></use></svg><span data-i18n="nav_leads">Leads</span></a>
        <a class="nav-item" data-nav="business-cards" data-client-link="/ui/business-card.html"><svg class="nav-icon" aria-hidden="true"><use href="/ui/icons.svg#icon-card"></use></svg><span data-i18n="nav_business_cards">Business card</span></a>
        <a class="nav-item" data-nav="posts" data-client-link="/ui/brand-posts.html"><svg class="nav-icon" aria-hidden="true"><use href="/ui/icons.svg#icon-posts"></use></svg><span data-i18n="nav_posts">Posts</span></a>
        <a class="nav-item" data-nav="content-plan" data-client-link="/ui/content-plan.html"><svg class="nav-icon" aria-hidden="true"><use href="/ui/icons.svg#icon-calendar"></use></svg><span data-i18n="nav_content_plan">Plan next month</span></a>
        <a class="nav-item" data-nav="pricing" href="/ui/pricing.html"><svg class="nav-icon" aria-hidden="true"><use href="/ui/icons.svg#icon-pricing"></use></svg><span data-i18n="nav_pricing">Pricing</span></a>
      </nav>
      <div class="sidebar-section nav-credits" id="nav-credits"></div>

        <div class="sidebar-label" data-i18n="nav_admin">Admin</div>

        <select class="select lang-select" id="lang-select" aria-label="Language">
          <option value="en">EN</option>
          <option value="ar">AR</option>
          <option value="he">HE</option>
        </select>
        <button class="button link" id="logout" data-i18n="common_logout">⎋ Logout</button>
      </div>
    </aside>
    <div class="app-content">
      <header class="app-header">
        <div class="header-left">
          <button class="icon-button" id="nav-toggle" aria-label="Open menu">☰</button>
          <a class="user-chip" id="user-chip" href="/ui/profile.html" title="Edit profile">
            <span class="user-avatar" id="user-avatar">U</span>
            <span class="user-chip-text">
              <span class="user-chip-row">
                <span id="user-welcome" data-i18n="welcome_user">Welcome</span>
                <span class="user-chip-caret">→</span>
              </span>
              <span id="plan-banner" class="plan-inline" style="display:none;"></span>
            </span>
          </a>
        </div>
        <div class="header-title" id="header-brand-name" style="display:none;">Adly</div>
        <div class="header-actions">
          <div id="header-credits" class="header-credits"></div>
          <div id="mobile-credits" class="mobile-credits"></div>
        </div>
      </header>

      <main class="container">
        <div class="section-header" style="margin-top: 16px;">
          <div class="section-title" data-i18n="common_landing_pages">Landing pages</div>
        </div>
        <section class="card">
          <div class="section-title" data-i18n="lp_create_title">Create a landing page</div>
          <div id="create-alert"></div>
          <form id="landing-create-form" class="stack">
            <div class="field">
              <label for="landing-prompt" data-i18n="lp_prompt_label">Describe what you want to sell</label>
              <textarea id="landing-prompt" data-i18n-placeholder="lp_prompt_placeholder" placeholder="Example: 50% off laser hair removal this week. Highlight painless sessions and book now."></textarea>
            </div>
            <div class="field">
              <label for="landing-images" data-i18n="lp_images_label">Optional images (up to 2)</label>
              <label class="upload-box" for="landing-images">
                <div class="upload-box-title" data-i18n="app_drop_images">Drop images here or click to upload</div>
                <div class="upload-box-subtitle" data-i18n="lp_images_hint">PNG or JPG · Max 2 files</div>
              </label>
              <input id="landing-images" type="file" accept="image/png,image/jpeg" multiple hidden>
              <div id="landing-images-preview" class="upload-preview"></div>
            </div>
            <button class="button" type="submit" data-i18n="lp_generate_button">Generate landing page</button>
          </form>
        </section>

        <section class="card" style="margin-top: 18px;">
          <div class="section-title" data-i18n="lp_my_pages">My landing pages</div>
          <div id="landing-pages-list" class="stack">
            <div class="muted" data-i18n="lp_no_pages">No landing pages yet.</div>
          </div>
        </section>
      </main>
    </div>

    initAppShell('landing-pages', { allowEmptyBrands: true });
