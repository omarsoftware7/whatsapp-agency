      <main class="container">
        <div class="section-header" style="margin-top: 16px;">
          <div class="section-title" data-i18n="contact_title">Contact sales</div>
        </div>
        <section class="card">
          <div id="contact-alert"></div>
          <form id="contact-form" class="stack">
            <div class="row">
              <div class="field">
                <label for="contact_name" data-i18n="contact_name">Full name</label>
                <input id="contact_name" type="text" required>
              </div>
              <div class="field">
                <label for="contact_email" data-i18n="contact_email">Work email</label>
                <input id="contact_email" type="email" required>
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="contact_company" data-i18n="contact_company">Company</label>
                <input id="contact_company" type="text" required>
              </div>
              <div class="field">
                <label for="contact_role" data-i18n="contact_role">Role</label>
                <input id="contact_role" type="text" placeholder="Founder, marketer, owner">
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="contact_team" data-i18n="contact_team">Team size</label>
                <select id="contact_team" required>
                  <option value="" disabled selected data-i18n="auth_select_one">Select one</option>
                  <option value="1-2">1-2</option>
                  <option value="3-5">3-5</option>
                  <option value="6-10">6-10</option>
                  <option value="11-25">11-25</option>
                  <option value="26+">26+</option>
                </select>
              </div>
              <div class="field">
                <label for="contact_website" data-i18n="contact_website">Website</label>
                <input id="contact_website" type="url" placeholder="https://">
              </div>
            </div>
            <div class="field">
              <label for="contact_subject" data-i18n="contact_subject">Subject</label>
              <input id="contact_subject" type="text" required>
            </div>
            <div class="field">
              <label for="contact_message" data-i18n="contact_message">How can we help?</label>
              <textarea id="contact_message" rows="6" required></textarea>
            </div>
            <div class="field checkbox">
              <label>
                <input id="contact_consent" type="checkbox" required>
                <span data-i18n="contact_consent">I agree to be contacted about Adly plans.</span>
              </label>
            </div>
            <div class="field" style="display:none;">
              <label for="contact_company_url">Company URL</label>
              <input id="contact_company_url" type="text" autocomplete="off">
            </div>
            <button class="button" type="submit" data-i18n="contact_submit">Send request</button>
          </form>
        </section>
      </main>
    </div>

  <script src="/ui/shared.js?v=20260126"></script>
  <script>
    initAppShell('pricing', { allowEmptyBrands: true });
    const form = document.getElementById('contact-form');
    const alertBox = document.getElementById('contact-alert');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearAlert(alertBox);
      const payload = {
        action: 'submit',
        name: document.getElementById('contact_name').value.trim(),
        email: document.getElementById('contact_email').value.trim(),
        company: document.getElementById('contact_company').value.trim(),
        role: document.getElementById('contact_role').value.trim(),
        team_size: document.getElementById('contact_team').value,
        website: document.getElementById('contact_website').value.trim(),
        subject: document.getElementById('contact_subject').value.trim(),
        message: document.getElementById('contact_message').value.trim(),
        honeypot: document.getElementById('contact_company_url').value.trim()
      };
      try {
        const response = await apiRequest('/web_contact.php', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        if (response.status === 'ok') {
          showAlert(alertBox, t('contact_success'), 'success');
          form.reset();
        } else {
          showAlert(alertBox, t('common_request_failed'));
        }
      } catch (error) {
        showAlert(alertBox, error.message || t('common_request_failed'));
      }
    });
  </script>
